<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="theme-color" content="#0a66c2" />
    <link rel="manifest" href="./manifest.json" />

    <title>Training Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page">
      <main class="dashboard-card" role="application" aria-label="Training Dashboard">
        <header class="header">
          <h1 class="title">My Training App</h1>
          <p class="subtitle">Quick access to your training links.</p>
        </header>

        <section class="actions" aria-label="Quick actions">
          <button
            type="button"
            class="action-button"
            data-link="https://teams.microsoft.com/meet/25891300204063?p=HfVBSKVq699dqMqxIc"
          >
            <span class="button-label">Join Meeting</span>
          </button>

          <button
            type="button"
            class="action-button"
            data-link="https://teams.microsoft.com/meet/25891300204063?p=HfVBSKVq699dqMqxIc"
          >
            <span class="button-label">April 20th Class</span>
          </button>

          <button
            type="button"
            class="action-button"
            data-link="https://mml.accenture.com/trainee-portal"
          >
            <span class="button-label">Mark Attendance</span>
          </button>

          <button
            type="button"
            class="action-button"
            data-link="https://digitallearning.accenture.com/atci"
          >
            <span class="button-label">Learning Portal</span>
          </button>
        </section>

        <footer class="footer" aria-hidden="true">
          Tip: Install this app from your browser for faster access.
        </footer>
      </main>
    </div>

    <script src="./script.js" defer></script>
  </body>
</html>
